<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CloudCanvas - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <h1 class="brand">CloudCanvas</h1>
    <p class="subtitle">Create your account to start editing</p>

    <input type="email" id="regEmail" placeholder="Email Address" class="input-field">
    <input type="password" id="regPassword" placeholder="Password" class="input-field">

    <button id="registerBtn" class="auth-btn">Register</button>

    <p class="switch-text">
      Already have an account? <a href="index.html">Login</a>
    </p>
  </div>

  <script type="module" src="register.js"></script>
</body>
</html>
