<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | CloudCanvas Editor</title>

  <!-- Using same theme CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

  <div class="auth-container">
    <h1 class="brand">CloudCanvas</h1>
    <p class="subtitle">Create your account to start editing</p>

    <form id="register-form">
      
      <input 
        type="email" 
        id="regEmail" 
        placeholder="Email Address" 
        class="input-field" 
        required
      >

      <input 
        type="password" 
        id="regPassword" 
        placeholder="Password" 
        class="input-field" 
        required
      >

      <button type="button" id="registerBtn" class="auth-btn">
        Register
      </button>

    </form>

    <p class="switch-text">
      Already have an account? 
      <a href="login.html">Login</a>
    </p>

  </div>

  <script type="module" src="register.js"></script>
</body>
</html>
